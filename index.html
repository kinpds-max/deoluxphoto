<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데오럭스 공간소개 이미지 다운로드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif; background: #f7f7f5; padding: 20px; }
.copyright-top { text-align: right; font-size: 11px; color: #a19660; margin-bottom: 8px; letter-spacing: 0.5px; font-weight: 600; }
.header { background: #0a592c; color: white; padding: 18px 28px; border-radius: 4px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; border-bottom: 3px solid #b81c2b; }
.logo-img { height: 72px; background: white; padding: 8px 14px; border-radius: 3px; object-fit: contain; }
.header-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header-text p { font-size: 12px; opacity: 0.8; margin-top: 5px; color: #a8d4b8; letter-spacing: 0.3px; }
.btn-all { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: #0a592c; color: white; border: none; padding: 15px; border-radius: 3px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 12px; letter-spacing: 0.5px; transition: all 0.2s; }
.btn-all:hover { background: #084a24; }
.progress-wrap { margin-bottom: 20px; display: none; }
.progress-bar { background: #e0e0e0; border-radius: 2px; height: 6px; }
.progress-fill { background: #0a592c; height: 6px; border-radius: 2px; width: 0%; transition: width 0.3s; }
.progress-text { text-align: center; font-size: 13px; color: #555; margin-top: 8px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.card { background: white; border-radius: 3px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.08); border-top: 3px solid #0a592c; transition: transform 0.2s, box-shadow 0.2s; }
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(10,89,44,0.15); }
.img-wrap { position: relative; height: 175px; background: #eee; overflow: hidden; cursor: pointer; }
.img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }
.img-wrap:hover img { opacity: 0.88; }
.img-num { position: absolute; top: 8px; left: 8px; background: #0a592c; color: white; font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 2px; letter-spacing: 1px; }
.preview-hint { position: absolute; bottom: 8px; right: 8px; background: rgba(10,89,44,0.85); color: white; font-size: 10px; padding: 3px 7px; border-radius: 2px; }
.card-body { padding: 12px; }
.card-title { font-size: 14px; font-weight: 600; color: #0a592c; margin-bottom: 10px; letter-spacing: -0.2px; }
.btn-down { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; background: white; color: #0a592c; border: 1.5px solid #0a592c; padding: 9px; border-radius: 2px; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; transition: all 0.2s; letter-spacing: 0.3px; }
.btn-down:hover { background: #0a592c; color: white; }
.footer { text-align: right; padding: 20px 4px 10px; font-size: 11px; color: #a19660; letter-spacing: 0.5px; font-weight: 600; }
.modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.88); z-index: 1000; justify-content: center; align-items: center; }
.modal-overlay.active { display: flex; }
.modal-box { position: relative; max-width: 90vw; max-height: 90vh; }
.modal-box img { max-width: 90vw; max-height: 80vh; object-fit: contain; border-radius: 3px; display: block; transition: opacity 0.15s ease; }
.modal-info { background: #0a592c; color: white; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 3px 3px; border-top: 2px solid #b81c2b; }
.modal-info span { font-size: 14px; font-weight: 600; }
.modal-close { position: absolute; top: -14px; right: -14px; background: #b81c2b; color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }
.modal-download { background: white; color: #0a592c; border: none; padding: 6px 14px; border-radius: 2px; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; }
.modal-download:hover { background: #f0f0f0; }
.modal-nav { position: absolute; top: 50%; transform: translateY(-60%); background: rgba(10,89,44,0.85); color: white; border: none; width: 44px; height: 44px; font-size: 28px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; transition: background 0.2s; }
.modal-nav:hover { background: #0a592c; }
.modal-prev { left: -22px; }
.modal-next { right: -22px; }
.modal-dots { display: flex; justify-content: center; gap: 6px; padding: 8px 0 2px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; transition: background 0.2s; }
.dot.active { background: #a19660; }
</style>
</head>

const grid = document.getElementById('grid');
images.forEach((img, idx) => {
  grid.innerHTML += `
    <div class="card">
      <div class="img-wrap" onclick="openModal(idx)">
        <img src="${img.url}" alt="${img.title}" loading="lazy" onerror="this.parentElement.style.background='#eee'">
        <span class="img-num">씬 ${img.num}</span>
        <span class="preview-hint">🔍 미리보기</span>
      </div>
      <div class="card-body">
        <div class="card-title">${img.title}</div>
        <a class="btn-down" href="${img.url}" download="${img.filename}" target="_blank">⬇ 다운로드</a>
      </div>
    </div>`;
});

async function downloadAll() {
  const wrap = document.getElementById('progressWrap');
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  wrap.style.display = 'block';
  for (let i = 0; i < images.length; i++) {
    const img = images[i];
    text.textContent = `다운로드 중... ${i+1} / ${images.length} — ${img.title}`;
    fill.style.width = ((i+1)/images.length*100) + '%';
    const a = document.createElement('a');
    a.href = img.url;
    a.download = img.filename;
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    await new Promise(r => setTimeout(r, 900));
  }
  text.textContent = '✅ 전체 11장 다운로드 완료!';
}
</script>

<!-- 슬라이드 미리보기 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button>
    <button class="modal-nav modal-prev" onclick="slideModal(-1)">&#8249;</button>
    <button class="modal-nav modal-next" onclick="slideModal(1)">&#8250;</button>
    <img id="modalImg" src="" alt="">
    <div class="modal-info">
      <span id="modalTitle"></span>
      <a id="modalDownload" class="modal-download" href="" download="" target="_blank">⬇ 다운로드</a>
    </div>
    <div class="modal-dots" id="modalDots"></div>
  </div>
</div>

<script>
let currentIdx = 0;

function openModal(idx) {
  currentIdx = idx;
  updateModal();
  document.getElementById('modalOverlay').classList.add('active');
  renderDots();
}

function updateModal() {
  const img = images[currentIdx];
  const el = document.getElementById('modalImg');
  el.style.opacity = '0';
  setTimeout(() => {
    el.src = img.url;
    el.style.opacity = '1';
  }, 150);
  document.getElementById('modalTitle').textContent = '씬 ' + img.num + ' — ' + img.title;
  document.getElementById('modalDownload').href = img.url;
  document.getElementById('modalDownload').download = img.filename;
  renderDots();
}

function slideModal(dir) {
  currentIdx = (currentIdx + dir + images.length) % images.length;
  updateModal();
}

function renderDots() {
  const dots = document.getElementById('modalDots');
  dots.innerHTML = images.map((_, i) =>
    `<span class="dot ${i === currentIdx ? 'active' : ''}" onclick="currentIdx=${i};updateModal()"></span>`
  ).join('');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('active');
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('active');
  if (e.key === 'ArrowLeft') slideModal(-1);
  if (e.key === 'ArrowRight') slideModal(1);
});

// 터치 스와이프
let touchStartX = 0;
document.getElementById('modalOverlay').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.getElementById('modalOverlay').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) slideModal(diff > 0 ? 1 : -1);
});
</script>
